apiVersion: apps/v1
kind: Deployment
metadata:
  name: orchestrator
  labels:
    app: orchestrator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: orchestrator
  template:
    metadata:
      labels:
        app: orchestrator
    spec:
      containers:
        - name: orchestrator
          image: fawad23/orchestrator:1.1.0
          ports:
            - containerPort: 8080
          env:
            - name: SEARCH_API_URL
              value: "http://search-api"
            - name: SEARCHAGENT_URL
              value: "http://searchagent"

---
apiVersion: v1
kind: Service
metadata:
  name: orchestrator
  labels:
    app: orchestrator
spec:
  type: ClusterIP
  selector:
    app: orchestrator
  ports:
    - port: 80
      targetPort: 8080
