#########################################################
# Webapp Configuration
#########################################################
apiVersion: apps/v1
kind: Deployment
metadata:
  name: webapp
  labels:
    app: webapp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: webapp
  template:
    metadata:
      labels:
        app: webapp
    spec:
      containers:
        - name: webapp
          image: fawad23/webapp:1.2.1
          ports:
            - name: http-web
              containerPort: 8080
          env:
            - name: ORCHESTRATOR_URL
              value: "http://orchestrator"
            - name: FeatureManagement__SearchAgent
              value: "true"

---
apiVersion: v1
kind: Service
metadata:
  name: webapp
  labels:
    app: webapp
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "80"
spec:
  type: NodePort
  selector:
    app: webapp
  ports:
    - name: http
      port: 80
      targetPort: 8080
      nodePort: 30080

---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: webapp-monitor
  namespace: monitoring
  labels:
    app: webapp
    release: kube-prometheus-stack
spec:
  namespaceSelector:
    matchNames:
      - default
  selector:
    matchLabels:
      app: webapp
  endpoints:
    - interval: 15s
      port: http
