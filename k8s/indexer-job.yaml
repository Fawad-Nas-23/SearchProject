apiVersion: batch/v1
kind: Job
metadata:
  name: indexer
  labels:
    app: indexer
spec:
  ttlSecondsAfterFinished: 300
  backoffLimit: 2
  template:
    metadata:
      labels:
        app: indexer
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-rabbitmq
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for rabbitmq:5672..."
              until nc -z rabbitmq 5672; do sleep 2; done
              echo "RabbitMQ is up!"
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for postgres..."
              until nc -z searchdb-postgresql.database.svc.cluster.local 5432; do sleep 2; done
              echo "Postgres is up!"
      containers:
        - name: indexer
          image: fawad23/indexer:1.2.1
          env:
            - name: FEATURE_SEARCHAGENT_ENABLED
              value: "true"
            - name: INDEXER_DATABASE
              value: "postgres"
            - name: INDEXER_FOLDER
              value: "/data/small/compaq"
            - name: POSTGRES_CONNECTION
              value: "Host=searchdb-postgresql.database.svc.cluster.local;Port=5432;Username=postgres;Password=1234;Database=SearchDB"
            - name: RABBITMQ_HOST
              value: "rabbitmq"
            - name: RABBITMQ_USER
              valueFrom:
                secretKeyRef:
                  name: rabbitmq-secret
                  key: RABBITMQ_DEFAULT_USER
            - name: RABBITMQ_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: rabbitmq-secret
                  key: RABBITMQ_DEFAULT_PASS
          volumeMounts:
            - name: seed-data
              mountPath: /data
              readOnly: true
      volumes:
        - name: seed-data
          hostPath:
            path: /mnt/seData
            type: Directory
